# Agentic-RL Sandbox Benchmark - service topology
# Use profiles to start/stop per benchmark group:
#   docker compose --profile b1 up -d
#   docker compose --profile b3 up -d
#   docker compose --profile b4 up -d
#   docker compose --profile b5 up -d
#   docker compose --profile orchestrator up
#
# All images are multi-arch (linux/amd64 + linux/arm64)
# so the same compose file runs on c7i and c8g unchanged.

x-common-env: &common-env
  PYTHONUNBUFFERED: "1"
  TZ: "UTC"

# Shared ulimits anchor. B9's high-concurrency sweeps (1024+ rollouts
# each fanning out to 3 worker services) push the per-container open-fd
# count well past the default 1024 ceiling. nginx + uvicorn + asyncpg-
# style sockets all consume fds, so be generous on every long-running
# worker. Orchestrator is excluded (transient `run --rm` container).
x-bench-ulimits: &bench-ulimits
  nofile:
    soft: 65535
    hard: 65535

services:

  # ===========================================================
  # Orchestrator - runs the benchmark suite, collects metrics,
  # uploads to S3. One per host.
  # ===========================================================
  orchestrator:
    image: ${REGISTRY}/orchestrator:${IMAGE_TAG}
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-orchestrator
    profiles: ["orchestrator", "all"]
    environment:
      <<: *common-env
      S3_BUCKET: ${S3_BUCKET}
      S3_PREFIX: ${S3_PREFIX}
      AWS_REGION: ${AWS_REGION}
      DURATION_SEC: ${DURATION_SEC}
      CONCURRENCIES: ${CONCURRENCIES}
      CLIENT_NPROCS: ${CLIENT_NPROCS:-0}
      WARMUP_SEC: ${WARMUP_SEC}
      COOLDOWN_SEC: ${COOLDOWN_SEC}
      PRICE_C7I_4XL: ${PRICE_C7I_4XL}
      PRICE_C8G_4XL: ${PRICE_C8G_4XL}
      B8_TRIALS: ${B8_TRIALS}
      SKIP: ${SKIP:-}
      # Service endpoints (used by runners)
      B1_WORKER_URL: http://b1-codeexec-worker:8001
      B3_API_URL: http://b3-mock-api:8003
      B4_WORKER_URL: http://b4-playwright-worker:8004
      B4_TARGET_URL: http://b4-webarena-static:80
      B5_WORKER_URL: http://b5-sql-runner:8005
      B7_WORKER_URL: http://b7-textgame:8007
    volumes:
      - ./results:/results
      - /var/run/docker.sock:/var/run/docker.sock  # for B8 cold-start tests
      - ~/.aws:/root/.aws:ro                       # for S3 upload (optional, IMDS works too)
    ulimits: *bench-ulimits
    networks:
      - bench-net
    # Note: depends_on intentionally omitted. Service startup is managed
    # explicitly by scripts/run-single.sh / run-suite.sh (which start only
    # the workers a given benchmark needs). Listing cross-profile deps
    # here would make `docker compose ... orchestrator` fail with
    # "undefined service" when only some profiles are active.

  # ===========================================================
  # B1 - Code execution worker (Python)
  # Long-running container; orchestrator submits code via HTTP
  # ===========================================================
  b1-codeexec-worker:
    image: ${REGISTRY}/b1-codeexec:${IMAGE_TAG}
    build:
      context: ./workers/b1-codeexec
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-b1-worker
    profiles: ["b1", "b9", "all"]
    environment:
      <<: *common-env
      # auto = match container vCPU count (default). Override to a fixed
      # integer when comparing different worker counts.
      B1_UVICORN_WORKERS: "${B1_UVICORN_WORKERS:-auto}"
    ulimits: *bench-ulimits
    networks:
      - bench-net

  # ===========================================================
  # B3 - Mock tool/API server (FastAPI + SQLite)
  # ===========================================================
  b3-mock-api:
    image: ${REGISTRY}/b3-mock-api:${IMAGE_TAG}
    build:
      context: ./workers/b3-mock-api
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-b3-api
    profiles: ["b3", "b9", "all"]
    environment:
      <<: *common-env
      # auto = use all container vCPUs (default). Override with
      # B3_UVICORN_WORKERS env on the host to compare fewer workers
      # (useful for isolating per-core throughput).
      B3_UVICORN_WORKERS: "${B3_UVICORN_WORKERS:-auto}"
    ulimits: *bench-ulimits
    networks:
      - bench-net

  # ===========================================================
  # B4 - Playwright headless Chromium worker
  # ===========================================================
  b4-playwright-worker:
    image: ${REGISTRY}/b4-playwright:${IMAGE_TAG}
    build:
      context: ./workers/b4-playwright
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-b4-worker
    profiles: ["b4", "all"]
    environment:
      <<: *common-env
      TARGET_URL: http://b4-webarena-static:80
      # Per-uvicorn-worker context cap. Total in-flight contexts =
      # B4_UVICORN_WORKERS * MAX_CONTEXTS.
      MAX_CONTEXTS: "${B4_MAX_CONTEXTS:-0}"
      # Multi-process Chromium so a single asyncio loop / single IPC
      # pipe doesn't bottleneck the throughput. auto = vCPU/4 with
      # 1-16 floor/ceiling.
      B4_UVICORN_WORKERS: "${B4_UVICORN_WORKERS:-auto}"
    shm_size: "2gb"
    ipc: host
    cap_add:
      - SYS_ADMIN
    ulimits: *bench-ulimits
    networks:
      - bench-net
    depends_on:
      - b4-webarena-static

  # ===========================================================
  # B4 dep - static WebArena snapshot (nginx serving HTML)
  # ===========================================================
  b4-webarena-static:
    image: ${REGISTRY}/b4-webarena-static:${IMAGE_TAG}
    build:
      context: ./workers/b4-webarena-static
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-b4-target
    profiles: ["b4", "all"]
    ulimits: *bench-ulimits
    networks:
      - bench-net

  # ===========================================================
  # B5 - DuckDB in-process with TPC-H workload (sf=1 default).
  # Single self-contained service; no external database.
  # ===========================================================
  b5-sql-runner:
    image: ${REGISTRY}/b5-sql-runner:${IMAGE_TAG}
    build:
      context: ./workers/b5-sql-runner
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-b5-runner
    profiles: ["b5", "b9", "all"]
    environment:
      <<: *common-env
      TPCH_SF: "${TPCH_SF:-1.0}"
      DUCKDB_THREADS: "${DUCKDB_THREADS:-0}"
      DUCKDB_MEM_LIMIT: "${DUCKDB_MEM_LIMIT:-}"
    ulimits: *bench-ulimits
    networks:
      - bench-net

  # ===========================================================
  # B7 - text-game simulator (ALFWorld/TextWorld-style).
  # Pure-Python; multi-process uvicorn so we exploit all vCPUs.
  # ===========================================================
  b7-textgame:
    image: ${REGISTRY}/b7-textgame:${IMAGE_TAG}
    build:
      context: ./workers/b7-textgame
      platforms:
        - linux/amd64
        - linux/arm64
    container_name: arl-b7-worker
    profiles: ["b7", "all"]
    environment:
      <<: *common-env
      # auto = container vCPU count.
      B7_UVICORN_WORKERS: "${B7_UVICORN_WORKERS:-auto}"
    ulimits: *bench-ulimits
    networks:
      - bench-net

networks:
  bench-net:
    driver: bridge
